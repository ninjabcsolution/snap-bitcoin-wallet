name: Publish Release

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
      QUICKNODE_TESTNET_ENDPOINT:
        required: true
      QUICKNODE_MAINNET_ENDPOINT:
        required: true
      SIMPLEHASH_API_KEY:
        required: true

jobs:
  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.sha }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
      - uses: MetaMask/action-publish-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        run: |
          yarn install
          yarn build
        env:
          QUICKNODE_TESTNET_ENDPOINT: ${{ secrets.QUICKNODE_TESTNET_ENDPOINT }}
          QUICKNODE_MAINNET_ENDPOINT: ${{ secrets.QUICKNODE_MAINNET_ENDPOINT }}
          SIMPLEHASH_API_KEY: ${{ secrets.SIMPLEHASH_API_KEY }}
      - uses: actions/cache@v4
        id: restore-build
        with:
          # We must cache the `snap.manifest.json` file because it might change
          # during the release build due to secrets being injected by the CI.
          path: |
            ./packages/*/dist
            ./packages/snap/snap.manifest.json
            ./node_modules/.yarn-state.yml
          key: ${{ github.sha }}

  publish-npm-dry-run:
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.sha }}
      - uses: actions/cache@v4
        id: restore-build
        with:
          # We must cache the `snap.manifest.json` file because it might change
          # during the release build due to secrets being injected by the CI.
          path: |
            ./packages/*/dist
            ./packages/snap/snap.manifest.json
            ./node_modules/.yarn-state.yml
          key: ${{ github.sha }}
      - name: Dry Run Publish
        # Omit npm-token token to perform dry-run publish
        uses: MetaMask/action-npm-publish@v4
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          subteam: S042S7RE4AE # @metamask-npm-publishers
        env:
          SKIP_PREPACK: true

  publish-npm:
    environment: npm-publish
    runs-on: ubuntu-latest
    needs: publish-npm-dry-run
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.sha }}
      - uses: actions/cache@v4
        id: restore-build
        with:
          # We must cache the `snap.manifest.json` file because it might change
          # during the release build due to secrets being injected by the CI.
          path: |
            ./packages/*/dist
            ./packages/snap/snap.manifest.json
            ./node_modules/.yarn-state.yml
          key: ${{ github.sha }}
      - name: Publish
        uses: MetaMask/action-npm-publish@v2
        with:
          # This `NPM_TOKEN` needs to be manually set per-repository.
          # Look in the repository settings under "Environments", and set this token in the `npm-publish` environment.
          npm-token: ${{ secrets.NPM_TOKEN }}
        env:
          SKIP_PREPACK: true
